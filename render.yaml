services:
  - type: web
    name: cardekho-shortlist
    runtime: node
    plan: free
    buildCommand: npm ci && npm run db:prepare && npm run build
    startCommand: npm run start
    envVars:
      - key: NODE_VERSION
        value: "20.18.0"
      - key: DATABASE_URL
        sync: false
      - key: AI_PROVIDER
        value: mock
      - key: GROQ_API_KEY
        sync: false
      - key: GROQ_MODEL
        value: llama-3.3-70b-versatile
